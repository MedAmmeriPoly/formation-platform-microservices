syntax = "proto3";

package users;

// Service de gestion des utilisateurs (etudiants et formateurs)
service UsersService {
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc GetUser (GetUserRequest) returns (UserResponse);
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
}

// Role possible d'un utilisateur
enum Role {
  STUDENT = 0;
  INSTRUCTOR = 1;
}

// Representation complete d'un utilisateur
message User {
  string id = 1;
  string full_name = 2;
  string email = 3;
  Role role = 4;
  string created_at = 5;
}

// --- Requetes ---

message CreateUserRequest {
  string full_name = 1;
  string email = 2;
  string password = 3;
  Role role = 4;
}

message GetUserRequest {
  string id = 1;
}

message ListUsersRequest {
  Role role_filter = 1;
  bool has_role_filter = 4;
  int32 page = 2;
  int32 page_size = 3;
}

message UpdateUserRequest {
  string id = 1;
  string full_name = 2;
  string email = 3;
}

message DeleteUserRequest {
  string id = 1;
}

// --- Reponses ---

message UserResponse {
  bool success = 1;
  string message = 2;
  User user = 3;
}

message ListUsersResponse {
  bool success = 1;
  repeated User users = 2;
  int32 total = 3;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}
