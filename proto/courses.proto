syntax = "proto3";

package courses;

// Service de gestion des cours, modules et lecons
service CoursesService {
  rpc CreateCourse (CreateCourseRequest) returns (CourseResponse);
  rpc GetCourse (GetCourseRequest) returns (CourseResponse);
  rpc ListCourses (ListCoursesRequest) returns (ListCoursesResponse);
  rpc UpdateCourse (UpdateCourseRequest) returns (CourseResponse);
  rpc DeleteCourse (DeleteCourseRequest) returns (DeleteCourseResponse);
  rpc AddLesson (AddLessonRequest) returns (LessonResponse);
  rpc IncrementEnrollmentCount (IncrementEnrollmentCountRequest) returns (CourseResponse);
}

// Une lecon appartenant a un cours
message Lesson {
  string id = 1;
  string title = 2;
  string content_url = 3;
  int32 duration_minutes = 4;
}

// Representation complete d'un cours
message Course {
  string id = 1;
  string title = 2;
  string description = 3;
  string instructor_id = 4;
  repeated Lesson lessons = 5;
  int32 enrolled_count = 6;
  string created_at = 7;
}

// --- Requetes ---

message CreateCourseRequest {
  string title = 1;
  string description = 2;
  string instructor_id = 3;
}

message GetCourseRequest {
  string id = 1;
}

message ListCoursesRequest {
  string instructor_id_filter = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message UpdateCourseRequest {
  string id = 1;
  string title = 2;
  string description = 3;
}

message DeleteCourseRequest {
  string id = 1;
}

message AddLessonRequest {
  string course_id = 1;
  string title = 2;
  string content_url = 3;
  int32 duration_minutes = 4;
}

message IncrementEnrollmentCountRequest {
  string course_id = 1;
}

// --- Reponses ---

message CourseResponse {
  bool success = 1;
  string message = 2;
  Course course = 3;
}

message ListCoursesResponse {
  bool success = 1;
  repeated Course courses = 2;
  int32 total = 3;
}

message DeleteCourseResponse {
  bool success = 1;
  string message = 2;
}

message LessonResponse {
  bool success = 1;
  string message = 2;
  Lesson lesson = 3;
}
